<!DOCTYPE html>
<html>
<head>
    <title>Discord Coins</title>
</head>
<body>
    <button id="loginBtn">Login with Discord</button>
    <button id="addCoinBtn">Add Coin</button>
    <div id="userList"></div>

    <script>
        const loginBtn = document.getElementById("loginBtn");
        const addCoinBtn = document.getElementById("addCoinBtn");
        const userListDiv = document.getElementById("userList");

        loginBtn.onclick = async () => {
            const url = await fetch("/login").then(r => r.text());
            window.location.href = url;
        };

        addCoinBtn.onclick = async () => {
            await fetch("/api/addCoin", { method: "POST" });
            loadUsers();
        };

        async function loadUsers() {
            const users = await fetch("/api/users").then(r => r.json());
            userListDiv.innerHTML = "";
            users.forEach(u => {
                const avatarUrl = u.avatar 
                    ? `https://cdn.discordapp.com/avatars/${u.id}/${u.avatar}.png?size=64`
                    : "https://cdn.discordapp.com/embed/avatars/0.png";
                const div = document.createElement("div");
                div.innerHTML = `<img src="${avatarUrl}" width="32" height="32"> ${u.username} - Coins: ${u.coins}`;
                userListDiv.appendChild(div);
            });
        }

        // Load users every 5 seconds
        setInterval(loadUsers, 5000);

        // Initial load
        loadUsers();
    </script>
</body>
</html>
